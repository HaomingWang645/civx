<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Human History Tech Tree — Paleolithic to Information Age</title>
  <meta name="description" content="Interactive visualization of human technological development: 393 technologies across 15 eras, from Oldowan stone tools (3.3 Mya) to the Information Age, with prerequisites, historical context, and what each tech unlocked." />
  <meta name="author" content="Haoming Wang" />
  <link rel="canonical" href="https://haomingwang645.github.io/civx/" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="Human History Tech Tree" />
  <meta property="og:description" content="393 technologies, 15 eras, from the Paleolithic to the Information Age — laid out as an interactive prerequisite graph." />
  <meta property="og:url" content="https://haomingwang645.github.io/civx/" />
  <meta property="og:image" content="https://haomingwang645.github.io/civx/images/og.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Human History Tech Tree" />
  <meta name="twitter:description" content="393 technologies, 15 eras, from the Paleolithic to the Information Age — laid out as an interactive prerequisite graph." />
  <meta name="twitter:image" content="https://haomingwang645.github.io/civx/images/og.png" />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Human History Tech Tree",
    "url": "https://haomingwang645.github.io/civx/",
    "description": "Interactive visualization of 393 human technologies across 15 eras, from the Lower Paleolithic to the Information Age.",
    "author": { "@type": "Person", "name": "Haoming Wang" },
    "inLanguage": ["en", "zh"]
  }
  </script>

  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="brand-dot"></span>
        <span class="topbar-title">Human History Tech Tree</span>
        <span class="topbar-sub">· Pleistocene → Information Age</span>
      </div>
      <div class="topbar-spacer"></div>
      <a class="topbar-link" href="techs.html" title="Plain-text index of every technology">All techs</a>
      <button class="theme-toggle" id="export-pdf" title="Export full tech tree as PDF (uses browser print → Save as PDF)" type="button">PDF</button>
      <button class="theme-toggle" id="orient-toggle" title="Toggle horizontal/vertical timeline" type="button">↕</button>
      <button class="theme-toggle" id="theme-toggle" title="Switch UI theme">Renaissance</button>
      <div class="search">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input id="search-input" type="text" placeholder="Search techs…" />
      </div>
    </header>

    <aside class="sidebar">
      <div class="legend-group">
        <div class="legend-header">
          <h3>Categories</h3>
          <button id="category-clear" class="legend-clear" type="button" hidden>Clear</button>
        </div>
        <div id="category-list"></div>
      </div>
      <div class="legend-group">
        <h3>Eras</h3>
        <div id="era-list"></div>
      </div>
    </aside>

    <main class="canvas-wrap">
      <svg id="canvas" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <circle cx="0" cy="0" r="1" class="grid-pattern" />
          </pattern>
        </defs>
        <g id="viewport">
          <rect class="grid-bg" x="-5000" y="-3000" width="30000" height="10000" fill="url(#grid)" />
          <g id="eras"></g>
          <g id="edges"></g>
          <g id="nodes"></g>
        </g>
      </svg>

      <aside id="detail" class="detail"></aside>

      <div class="controls">
        <button class="ctrl-btn" id="zoom-out" title="Zoom out">−</button>
        <button class="ctrl-btn" id="zoom-fit" title="Fit to view">⊡</button>
        <button class="ctrl-btn" id="zoom-in" title="Zoom in">+</button>
      </div>
      <div class="scrollbar-h" id="scrollbar-h">
        <div class="scrollbar-track" id="scrollbar-track">
          <div class="scrollbar-thumb" id="scrollbar-thumb"></div>
        </div>
      </div>
      <div class="zoom-level" id="zoom-level">100%</div>
      <div class="minimap" id="minimap" aria-hidden="true">
        <button class="minimap-toggle" id="minimap-toggle" type="button" title="Hide minimap">▾</button>
        <svg class="minimap-svg" id="minimap-svg" preserveAspectRatio="none">
          <g id="minimap-content"></g>
          <rect class="minimap-viewport" id="minimap-viewport" />
        </svg>
      </div>
    </main>
  </div>

  <script src="data.js"></script>
  <script src="images.js"></script>
  <script src="translations.js"></script>
  <script src="unlocks.js"></script>
  <script src="app.js"></script>
</body>
</html>
